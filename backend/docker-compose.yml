version: "3.9"

services:
  # ──────────────────── PostgreSQL ────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: waremind_postgres
    restart: always
    environment:
      POSTGRES_USER: waremind
      POSTGRES_PASSWORD: waremind_secret
      POSTGRES_DB: waremind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql

  # ──────────────────── ClickHouse ────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: waremind_clickhouse
    restart: always
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP interface
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./sql/clickhouse_init.sql:/docker-entrypoint-initdb.d/clickhouse_init.sql
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # ──────────────────── Redis ────────────────────
  redis:
    image: redis:7-alpine
    container_name: waremind_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  # ──────────────────── Kafka + Zookeeper ────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: waremind_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: waremind_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data

  # ──────────────────── FastAPI App ────────────────────
  api:
    build: .
    container_name: waremind_api
    restart: always
    depends_on:
      - postgres
      - clickhouse
      - redis
      - kafka
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://waremind:waremind_secret@postgres:5432/waremind
      - CLICKHOUSE_HOST=clickhouse
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    env_file:
      - .env
    volumes:
      - .:/app

  # ──────────────────── Celery Worker ────────────────────
  celery_worker:
    build: .
    container_name: waremind_celery
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      - redis
      - postgres
    env_file:
      - .env

volumes:
  postgres_data:
  clickhouse_data:
  redis_data:
  kafka_data:
